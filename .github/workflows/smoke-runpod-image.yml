name: Smoke RunPod Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: "RunPod SAM 3.1 speed-lab image to smoke test"
        required: true
        default: "ghcr.io/akhil-ghosh/whodoirunlike-runpod-processor:sam31-parity-candidate-REPLACE_ME"
      expected_role:
        description: "Expected exact base image role"
        required: true
        type: choice
        options:
          - candidate
          - control
          - schedule_only

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free runner disk
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/local/lib/android /usr/share/dotnet
          docker system prune --all --force --volumes
          df -h

      - name: Pull image
        run: docker pull "${{ inputs.image }}"

      - name: Import and call health handler
        run: |
          docker run --rm -i \
            --entrypoint python \
            -e HF_TOKEN=smoke-test-token \
            -e WHODOIRUNLIKE_ENABLE_SAM31_BENCHMARK=true \
            -e EXPECTED_BENCHMARK_IMAGE_ROLE="${{ inputs.expected_role }}" \
            "${{ inputs.image }}" \
            - <<'PY'
          import json
          import os

          from whodoirunlike.sam31_benchmark_serverless import handler
          from whodoirunlike.sam31_parity import (
              EXACT_CANDIDATE_COMMIT,
              EXACT_CANDIDATE_IMAGE_DIGEST,
              EXACT_CONTROL_COMMIT,
              EXACT_CONTROL_IMAGE_DIGEST,
          )

          payload = handler({"input": {"type": "health"}})
          print(json.dumps(payload, indent=2, sort_keys=True))
          expected_role = os.environ["EXPECTED_BENCHMARK_IMAGE_ROLE"]

          assert payload["status"] == "ok"
          assert payload["service"] == "sam31_speed_lab"
          assert payload["benchmark_enabled"] is True
          assert payload["has_hf_token"] is True
          assert payload["variant_ids"] == ["production_candidate_public_entrypoint"]
          assert payload["base_image_role"] == expected_role
          assert payload["base_contract"]["passed"] is True
          assert payload["base_contract"]["image_role"] == expected_role
          assert payload["base_contract"]["checked_file_count"] == 12
          assert payload["base_contract"]["mismatches"] == []
          if expected_role == "schedule_only":
              assert "production_candidate_schedule_only" in payload["full_profile_ids"]
              assert payload["base_processor_commit"] == EXACT_CONTROL_COMMIT
              assert payload["base_processor_image_digest"] == EXACT_CONTROL_IMAGE_DIGEST
              assert payload["code_overlay_source"] == "git_commit"
              assert payload["code_overlay_commit"] == EXACT_CANDIDATE_COMMIT
              assert (
                  payload["code_overlay_reference_image_digest"]
                  == EXACT_CANDIDATE_IMAGE_DIGEST
              )
              assert payload["dependency_base_role"] == "control"
              assert payload["dependency_base_commit"] == EXACT_CONTROL_COMMIT
              assert payload["dependency_base_image_digest"] == EXACT_CONTROL_IMAGE_DIGEST
          PY
