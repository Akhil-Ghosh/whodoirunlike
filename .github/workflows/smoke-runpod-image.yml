name: Smoke RunPod Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: "RunPod processor image to smoke test"
        required: true
        default: "ghcr.io/akhil-ghosh/whodoirunlike-runpod-processor:latest"

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free runner disk
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/local/lib/android /usr/share/dotnet
          docker system prune --all --force --volumes
          df -h

      - name: Pull image
        run: docker pull "${{ inputs.image }}"

      - name: Import and call health handler
        run: |
          docker run --rm -i \
            --entrypoint python \
            -e HF_TOKEN=smoke-test-token \
            -e WHODOIRUNLIKE_PROCESSOR_SHARED_SECRET=smoke-test-secret \
            "${{ inputs.image }}" \
            - <<'PY'
          import json

          from whodoirunlike.runpod_serverless import handler

          payload = handler({"input": {"type": "health"}})
          print(json.dumps(payload, indent=2, sort_keys=True))

          assert payload["status"] == "ok"
          health = payload["health"]
          assert health["has_processor_secret"] is True
          assert health["has_hf_token"] is True
          assert health["mask_backend"] == "sam31_gpu"
          PY
