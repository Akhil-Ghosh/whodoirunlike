name: Smoke RunPod Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: "RunPod processor image to smoke test"
        required: true
        default: "ghcr.io/akhil-ghosh/whodoirunlike-runpod-processor:latest"

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free runner disk
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/local/lib/android /usr/share/dotnet
          docker system prune --all --force --volumes
          df -h

      - name: Pull image
        run: docker pull "${{ inputs.image }}"

      - name: Import and call health handler
        run: |
          docker run --rm -i \
            --network none \
            --entrypoint python \
            -e HF_TOKEN=smoke-test-token \
            -e WHODOIRUNLIKE_PROCESSOR_SHARED_SECRET=smoke-test-secret \
            "${{ inputs.image }}" \
            - <<'PY'
          import json
          from importlib.metadata import version

          from whodoirunlike.identity_runner import identity_setup_status
          from whodoirunlike.mmpose_runner import build_rtmlib_model, mmpose_model_spec
          from whodoirunlike.runpod_serverless import handler

          payload = handler({"input": {"type": "health"}})
          print(json.dumps(payload, indent=2, sort_keys=True))

          assert payload["status"] == "ok"
          health = payload["health"]
          assert health["has_processor_secret"] is True
          assert health["has_hf_token"] is True
          assert health["mask_backend"] == "sam31_gpu"
          assert version("boxmot") == "21.0.0"

          identity = identity_setup_status(health["identity_backend"])
          print(json.dumps({"identity": identity}, indent=2, sort_keys=True))
          assert identity["ready"] is True, identity

          pose_model = build_rtmlib_model(
              mmpose_model_spec("mmpose_rtmpose_l_384"),
              device="cpu",
              runtime_backend="onnxruntime",
          )
          assert pose_model is not None
          PY
