name: Build Slim RunPod Processor Lab

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/akhil-ghosh/whodoirunlike-runpod-processor
  IMAGE_TAG: sam31-runtime-slim-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free runner disk
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runpod-slim
          platforms: linux/amd64
          push: true
          build-args: |
            WHODOIRUNLIKE_PROCESSOR_VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          provenance: false

  smoke:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          docker system prune --all --force --volumes
          df -h

      - name: Pull immutable lab image
        run: docker pull "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Verify runtime, models, native extensions, and handler
        run: |
          docker run --rm --network none --entrypoint python \
            "${IMAGE_NAME}:${IMAGE_TAG}" \
            /opt/whodoirunlike/runtime-contract.py --verify \
            > slim-runtime-contract.json

      - name: Verify build-only OS tools are absent
        run: |
          docker run --rm --network none --entrypoint /bin/bash \
            "${IMAGE_NAME}:${IMAGE_TAG}" -lc \
            'for command in gcc g++ git nvcc; do ! command -v "$command"; done'

      - name: Measure image and layer sizes
        run: |
          docker image inspect "${IMAGE_NAME}:${IMAGE_TAG}" > slim-image-inspect.json
          docker history --no-trunc --format '{{json .}}' \
            "${IMAGE_NAME}:${IMAGE_TAG}" > slim-image-history.jsonl
          docker manifest inspect --verbose \
            "${IMAGE_NAME}:${IMAGE_TAG}" > slim-image-manifest.json
          jq '
            (if type == "array" then
              map(select(.Descriptor.platform.architecture == "amd64"))[0]
            else . end) as $image
            | ($image.SchemaV2Manifest.layers // $image.OCIManifest.layers) as $layers
            | {
                candidate_compressed_bytes: 11894784793,
                slim_compressed_bytes: ($layers | map(.size) | add),
                slim_layer_count: ($layers | length),
                savings_bytes: (11894784793 - ($layers | map(.size) | add)),
                savings_ratio: (
                  (11894784793 - ($layers | map(.size) | add)) / 11894784793
                ),
                layers: ($layers | map({digest, size}))
              }
          ' slim-image-manifest.json > slim-image-metrics.json
          jq . slim-image-metrics.json
          jq -e '.savings_ratio > 0.20' slim-image-metrics.json

      - name: Upload lab evidence
        uses: actions/upload-artifact@v4
        with:
          name: sam31-runtime-slim-${{ github.sha }}
          retention-days: 7
          path: |
            slim-runtime-contract.json
            slim-image-inspect.json
            slim-image-history.jsonl
            slim-image-manifest.json
            slim-image-metrics.json
