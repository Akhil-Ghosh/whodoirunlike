name: Build Slim RunPod Processor Lab

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/akhil-ghosh/whodoirunlike-runpod-processor
  IMAGE_TAG: sam31-runtime-slim-${{ github.sha }}
  DONOR_IMAGE: ghcr.io/akhil-ghosh/whodoirunlike-runpod-processor@sha256:47d776f83ae3e2e1c7f1fa935b0019a9abd82a324ada4ab3d98746b3d75216fc

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          docker system prune --all --force --volumes
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable lab image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runpod-slim
          platforms: linux/amd64
          push: true
          build-args: |
            DEPENDENCY_IMAGE=${{ env.DONOR_IMAGE }}
            WHODOIRUNLIKE_PROCESSOR_VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          provenance: false

  smoke:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      LAB_IMAGE: ghcr.io/akhil-ghosh/whodoirunlike-runpod-processor@${{ needs.build.outputs.digest }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          docker system prune --all --force --volumes
          df -h

      - name: Pull immutable lab image
        run: docker pull "${LAB_IMAGE}"

      - name: Verify dependency, model, app, and environment contract
        run: |
          docker run --rm --network none --entrypoint python \
            "${LAB_IMAGE}" \
            /opt/whodoirunlike/runtime-contract.py \
            --verify \
            --baseline /opt/whodoirunlike/donor-dependencies.json \
            > slim-runtime-contract.json

      - name: Verify removed tools and forbidden assets
        run: |
          docker run --rm --network none --entrypoint /bin/bash \
            "${LAB_IMAGE}" -lc '
              for command in gcc g++ git nvcc; do
                ! command -v "$command"
              done
              ! find /app /opt /root/.cache -iname "*yolo26*" -print -quit 2>/dev/null | grep -q .
            '

      - name: Measure immutable image
        run: |
          docker image inspect "${LAB_IMAGE}" > slim-image-inspect.json
          docker history --no-trunc --format '{{json .}}' \
            "${LAB_IMAGE}" > slim-image-history.jsonl
          docker manifest inspect --verbose "${LAB_IMAGE}" > slim-image-manifest.json
          docker manifest inspect --verbose "${DONOR_IMAGE}" > donor-image-manifest.json
          donor_bytes="$(jq '
            (if type == "array" then
              map(select(.Descriptor.platform.architecture == "amd64"))[0]
            else . end) as $image
            | ($image.SchemaV2Manifest.layers // $image.OCIManifest.layers)
            | map(.size) | add
          ' donor-image-manifest.json)"
          jq --argjson donor_bytes "${donor_bytes}" '
            (if type == "array" then
              map(select(.Descriptor.platform.architecture == "amd64"))[0]
            else . end) as $image
            | ($image.SchemaV2Manifest.layers // $image.OCIManifest.layers) as $layers
            | ($layers | map(.size) | add) as $slim_bytes
            | {
                donor_compressed_bytes: $donor_bytes,
                slim_compressed_bytes: $slim_bytes,
                slim_layer_count: ($layers | length),
                savings_bytes: ($donor_bytes - $slim_bytes),
                savings_ratio: (($donor_bytes - $slim_bytes) / $donor_bytes),
                layers: ($layers | map({digest, size}))
              }
          ' slim-image-manifest.json > slim-image-metrics.json
          jq . slim-image-metrics.json
          jq -e '.savings_ratio > 0.20' slim-image-metrics.json

      - name: Upload lab evidence
        uses: actions/upload-artifact@v4
        with:
          name: sam31-runtime-slim-${{ github.sha }}
          retention-days: 7
          path: |
            slim-runtime-contract.json
            slim-image-inspect.json
            slim-image-history.jsonl
            slim-image-manifest.json
            donor-image-manifest.json
            slim-image-metrics.json
