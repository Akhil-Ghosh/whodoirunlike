mode: running
target_clips_per_runner:
  min: 3
  ideal: 5
runner_buckets:
  - id: "800_1500"
    label: 800m / 1500m
    target_runners: 10
  - id: "5k_10k"
    label: 5k / 10k
    target_runners: 10
  - id: "marathon"
    label: Marathon / road
    target_runners: 10
